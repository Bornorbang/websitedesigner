{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Website Designer Nigeria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <section class="min-h-screen flex items-center justify-center py-24">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <!-- 404 Number -->
            <h1 class="text-9xl font-bold text-red-600 mb-4">404</h1>
            
            <!-- Error Message -->
            <h2 class="text-3xl lg:text-4xl font-bold text-gray-900 mb-6">Page Not Found</h2>
            <p class="text-lg text-gray-600 mb-8">
                Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
            </p>
            
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/" class="inline-block bg-red-600 hover:bg-red-700 text-white font-semibold px-8 py-4 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl">
                    <i class="fas fa-home mr-2"></i>
                    Go Home
                </a>
                <a href="/contact-website-designer-nigeria/" class="inline-block bg-gray-800 hover:bg-gray-900 text-white font-semibold px-8 py-4 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl">
                    <i class="fas fa-envelope mr-2"></i>
                    Contact Support
                </a>
            </div>
            
            <!-- Helpful Links -->
            <div class="mt-12 pt-8 border-t border-gray-200">
                <p class="text-sm text-gray-500 mb-4">You might be looking for:</p>
                <div class="flex flex-wrap gap-3 justify-center">
                    <a href="/website-development-services/" class="text-red-600 hover:text-red-700 text-sm underline">Our Services</a>
                    <span class="text-gray-300">|</span>
                    <a href="/web-design-portfolio/" class="text-red-600 hover:text-red-700 text-sm underline">Portfolio</a>
                    <span class="text-gray-300">|</span>
                    <a href="/website-design-pricing/" class="text-red-600 hover:text-red-700 text-sm underline">Pricing</a>
                    <span class="text-gray-300">|</span>
                    <a href="/tech-blog/" class="text-red-600 hover:text-red-700 text-sm underline">Blog</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
