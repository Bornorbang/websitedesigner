{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request | Website Designer Nigeria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <section class="min-h-screen flex items-center justify-center py-24">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <!-- 400 Number -->
            <h1 class="text-9xl font-bold text-red-600 mb-4">400</h1>
            
            <!-- Error Message -->
            <h2 class="text-3xl lg:text-4xl font-bold text-gray-900 mb-6">Bad Request</h2>
            <p class="text-lg text-gray-600 mb-8">
                The request could not be understood by the server. Please check your input and try again.
            </p>
            
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/" class="inline-block bg-red-600 hover:bg-red-700 text-white font-semibold px-8 py-4 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl">
                    <i class="fas fa-home mr-2"></i>
                    Go Home
                </a>
                <a href="/contact-website-designer-nigeria/" class="inline-block bg-gray-800 hover:bg-gray-900 text-white font-semibold px-8 py-4 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-xl">
                    <i class="fas fa-envelope mr-2"></i>
                    Contact Support
                </a>
            </div>
        </div>
    </section>
</body>
</html>
